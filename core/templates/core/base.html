{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
        <!-- Favicon - posicionado logo após charset para carregamento rápido -->
        <link rel="icon" href="{% static 'core/img/favicon.ico' %}" type="image/x-icon">
        <link rel="shortcut icon" href="{% static 'core/img/favicon.ico' %}" type="image/x-icon">
        <!-- Otimização mobile: preconnect apenas para CDN principal -->
        <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/photo-sphere-viewer@3.5.1/dist/photo-sphere-viewer.css" crossorigin="anonymous">
        <title>{% block title %}Studio de Tatuagem{% endblock %}</title>

        <style>
html {
    scroll-behavior: smooth;
}

/* Otimização de performance para one-page */
* {
    -webkit-tap-highlight-color: transparent;
}

/* Scroll suave para navegação one-page */
@media (prefers-reduced-motion: no-preference) {
    html {
        scroll-behavior: smooth;
    }
}

            body {
                margin: 0;
                padding: 0;
                background-color: #000;
                color: #f5c400; /* amarelo */
                font-family: 'Arial', Helvetica, sans-serif;
            }
            

            main {
                padding: 0;
                background-color: #000;
                color: #f5c400;
                max-width: 100%;
                margin: 0;
                position: relative;
                z-index: 50;
            }
            
            /* Background fixo para todas as seções após a home */
            main::after {
                content: '';
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: url('/media/trabalhos/bg.jpg') center / cover no-repeat;
                background-attachment: fixed;
                opacity: 0.35;
                z-index: -1;
                pointer-events: none;
            }
            
            /* Ajuste para mobile - background scroll */
            @media (max-width: 768px) {
                main::after {
                    background-attachment: scroll;
                    position: absolute;
                    height: auto;
                    min-height: 100vh;
                }
            }
            
            /* Seções one-page com transições premium */
            .section {
                padding: 80px 40px;
                min-height: auto;
                max-width: 1100px;
                margin: 0 auto;
                position: relative;
                z-index: 1;
                opacity: 0;
                transform: translateY(30px);
                transition: opacity 0.8s ease-out, transform 0.8s ease-out;
                border-radius: 20px;
                border: none;
            }
            
            /* Seção visível (animada) */
            .section.visible {
                opacity: 1;
                transform: translateY(0);
            }
            
            .section.dark {
                background-color: rgba(17, 17, 17, 0.65);
            }
            
            /* Seções normais com overlay sutil */
            .section:not(.dark) {
                background-color: rgba(0, 0, 0, 0.5);
            }
            
            .section h2 {
                color: #f5c400;
                font-size: 36px;
                text-align: center;
                margin-bottom: 40px;
                opacity: 0;
                transform: translateY(20px);
                transition: opacity 0.8s ease-out 0.2s, transform 0.8s ease-out 0.2s;
                text-shadow: 0 2px 10px rgba(245, 196, 0, 0.3);
                position: relative;
            }
            
            .section.visible h2 {
                opacity: 1;
                transform: translateY(0);
            }
            
            /* Linha decorativa sutil abaixo do título */
            .section h2::after {
                content: '';
                position: absolute;
                bottom: -15px;
                left: 50%;
                transform: translateX(-50%);
                width: 0;
                height: 1px;
                background: linear-gradient(90deg, transparent, rgba(245, 196, 0, 0.4), transparent);
                opacity: 0;
                transition: opacity 0.6s ease-out 0.4s, width 0.6s ease-out 0.4s;
            }
            
            .section.visible h2::after {
                opacity: 1;
                width: 80px;
            }
            
            /* Animações escalonadas para elementos filhos específicos */
            .section > div:not(.artist-modal):not(.lightbox):not([id*="modal"]):not([id*="viewer"]) {
                opacity: 0;
                transform: translateY(15px);
                transition: opacity 0.6s ease-out, transform 0.6s ease-out;
            }
            
            .section.visible > div:not(.artist-modal):not(.lightbox):not([id*="modal"]):not([id*="viewer"]) {
                opacity: 1;
                transform: translateY(0);
            }
            
            /* Delay escalonado para elementos diretos */
            .section.visible > div:nth-child(2):not(.artist-modal):not(.lightbox):not([id*="modal"]):not([id*="viewer"]) { 
                transition-delay: 0.1s; 
            }
            .section.visible > div:nth-child(3):not(.artist-modal):not(.lightbox):not([id*="modal"]):not([id*="viewer"]) { 
                transition-delay: 0.2s; 
            }
            .section.visible > div:nth-child(4):not(.artist-modal):not(.lightbox):not([id*="modal"]):not([id*="viewer"]) { 
                transition-delay: 0.3s; 
            }
            .section.visible > div:nth-child(5):not(.artist-modal):not(.lightbox):not([id*="modal"]):not([id*="viewer"]) { 
                transition-delay: 0.4s; 
            }
            
            /* Garantir que modais e overlays não sejam afetados */
            .artist-modal,
            .lightbox,
            [id*="modal"],
            [id*="viewer"] {
                opacity: 1 !important;
                transform: none !important;
                transition: none !important;
            }
            
            /* Hero section não precisa de padding extra e não deve ser animada */
            .hero-section {
                padding: 0;
                margin: 0;
                opacity: 1 !important;
                transform: none !important;
            }
            
            /* Sombra suave e sutil nas seções para profundidade */
            .section.visible {
                box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            }
            
            @media (max-width: 768px) {
                .section {
                    padding: 60px 15px;
                    transform: translateY(20px);
                    border-radius: 15px;
                }
                
                .section.visible {
                    transform: translateY(0);
                }
                
                .section h2 {
                    font-size: 28px;
                    margin-bottom: 30px;
                    transform: translateY(15px);
                }
                
                .section.visible h2 {
                    transform: translateY(0);
                }
            }
            
            @media (max-width: 480px) {
                .section {
                    padding: 50px 10px;
                    transform: translateY(15px);
                    border-radius: 12px;
                }
                
                .section.visible {
                    transform: translateY(0);
                }
                
                .section h2 {
                    font-size: 24px;
                    margin-bottom: 25px;
                    transform: translateY(10px);
                }
                
                .section.visible h2 {
                    transform: translateY(0);
                }
                
                /* Reduzir padding-top da loja para aproximar do portfólio de piercing */
                #loja {
                    padding-top: 20px;
                }
            }
            .hero-section {
                position: relative;
                min-height: 100vh;
                background: url("/static/core/img/hero.jpg") center / 120% no-repeat;
                background-attachment: fixed;
                display: flex;
                align-items: center;
                justify-content: center;
                overflow: hidden; /* Garantir que os efeitos não saiam da área */
            }
            
            /* Garantir que hero-hover tenha altura completa */
            .hero-section .hero-hover {
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                z-index: 1;
            }
            
            /* Otimização mobile: background fixo desabilitado e altura reduzida */
            @media (max-width: 768px) {
                .hero-section {
                    min-height: 70vh;
                    background-attachment: scroll;
                    background-size: 120%;
                }
            }
            
            @media (max-width: 480px) {
                .hero-section {
                    min-height: 60vh;
                }
            }
            .hero-overlay {
                position: absolute;
                inset: 0;
                background: rgba(0, 0, 0, 0.65);
                z-index: 1;
            }
            .hero-content {
                position: relative;
                z-index: 10;
                text-align: center;
                padding: 20px;
            }
            
            .hero-content h1 {
                font-size: 48px;
                color: #f5c400;
                margin-bottom: 15px;
                text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            }
            
            .hero-content p {
                font-size: 20px;
                color: #fff;
                text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
            }
            
            @media (max-width: 768px) {
                .hero-content h1 {
                    font-size: 36px;
                }
                
                .hero-content p {
                    font-size: 18px;
                }
            }
            
            @media (max-width: 480px) {
                .hero-content {
                    padding: 15px;
                }
                
                .hero-content h1 {
                    font-size: 28px;
                    margin-bottom: 10px;
                }
                
                .hero-content p {
                    font-size: 16px;
                }
            }

        /*Camada de eletricidade */
        .electric-layer {
            position: absolute;
            inset: 0;
            pointer-events: none;
            background-image: 
            radial-gradient(circle, rgba(0, 255, 251, 0.9) 1px, transparent 2px),
            radial-gradient(circle, rgba(0, 255, 242, 0.7) 1px, transparent 3px),
            radial-gradient(circle, rgba(120, 255, 255, 0.8) 1px, transparent 3px);
            background-size: 180% 180%, 260px 260px, 140px 140px;
            animation: electricMove 10s linear infinite, electricPulse 2s ease-in-out infinite;
            mix-blend-mode: screen;
            z-index: 2;
        }
        
        /* Flash de luz na tela */
        .light-flash {
            position: absolute;
            inset: 0;
            background: rgba(255, 255, 255, 0.1);
            opacity: 0;
            pointer-events: none;
            z-index: 6;
            animation: lightFlash 3s ease-in-out infinite;
        }
        
        @keyframes lightFlash {
            0%, 90%, 100% { opacity: 0; }
            45% { opacity: 0.3; }
            50% { opacity: 0.1; }
        }
        
        /* Todos os efeitos ativos em todas as telas */
        @keyframes electricMove {
            from { background-position: 0 0, 0 0, 0 0; }
            to { background-position: 800% 600%, 600% -800%, -500% 400%; }
        }
        @keyframes electricPulse {
            0% { opacity: 0.4; }
            50% { opacity: 1; }
            100% { opacity: 0.4; }
        }

        /*Camadas de faíscas*/
        .sparks {
            position: absolute;
            inset: 0;
            pointer-events: none;
            background-image: radial-gradient(circle, rgba(255,200,0,0.8) 2px, transparent 3px),
            radial-gradient(circle, rgba(255,140,0,0.7) 2px, transparent 3px),
            radial-gradient(circle, rgba(255,220,120,0.9) 1.5px, transparent 3px);
            background-size: 200% 200%, 300px 300px, 150px 150px;
            background-position: 0% 0%, 50% 50%, 100% 100%;
            animation: sparkMove 12s linear infinite, sparkPulse 3s ease-in-out infinite;
            z-index: 3;
        }

        @keyframes sparkMove {
            0% { background-position: 0% 0%, 50% 50%, 100% 100%; }
            50% { background-position: 100% 100%, 0% 0%, 50% 50%; }
            100% { background-position: 0% 0%, 50% 50%, 100% 100%; }
        }

        @keyframes sparkPulse {
            0% { opacity: 0.6; }
            50% { opacity: 1; }
            100% { opacity: 0.6; }
        }

        /*Câmbada de relâmpagos*/
        .lightning {
            position: absolute;
            inset: 0;
            pointer-events: none;
            background-image: linear-gradient(120deg, transparent 45%, rgba(0,180,255,0.9) 50%, transparent 55%),
            linear-gradient(240deg, transparent 48%, rgba(255, 255, 120, 0.8) 50%, transparent 52%),
            linear-gradient(300deg, transparent 47%, rgba(234, 255, 0, 0.7) 50%, transparent 53%);
            background-size: 400% 800%, 300% 600%, 500% 900%;
            opacity: 0;
            animation: lightningFlash 4s infinite;
            mix-blend-mode: screen;
            z-index: 4;
        }

        /*pisca rápido como relâmpagos*/
        @keyframes lightningFlash {
            0%, 95%, 100% { opacity: 0; }
            96% { opacity: 1; }
            97% { opacity: 0.4; }
            98% { opacity: 1; }
            99% { opacity: 0; }
        }
        /*Flash de luz na tela*/
        .flash {
            position: absolute;
            inset: 0;
            background: rgb(60, 59, 59);
            opacity: 0;
            pointer-events: none;
            z-index: 5;
        }

        .hero-text {
            background-color: rgba(30, 26, 26, 0.6);
            padding: 40px;
            border-radius: 12px;
            max-width: 520px;
            border: 1px solid rgba(255, 196, 0, 0.4);
            position: relative;
            z-index: 5; 
            animation: fadeIn 0.9s ease-out;
            box-sizing: border-box;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(25px); }
            to { opacity: 1; transform: translateY(0); }
        }
        /* ====== Página Estúdio ====== */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 10px;
            padding: 20px 0;
        }
            .gallery-grid img {
            width: 100%;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
            height: auto;
        }
        .gallery-grid img:hover {
            transform: scale(1.05);
        }
        
        /* Desabilitar hover no mobile */
        @media (max-width: 768px) {
            .gallery-grid img:hover {
                transform: none;
            }
        }
        .estudio-container {
            margin: 60px auto;
            padding: 0 20px;
            max-width: 1100px;
        }
        .viewer360 {
            width: 100%;
            max-width: 700px;
            height: 450px;
            margin: 20px auto 60px;
            border: 2px solid #f5c400;
            border-radius: 12px;
            overflow: hidden;
            position: relative;
            display: block;
            background-color: #000;
        }
        
        .viewer360 * {
            box-sizing: border-box;
        }
        
        .viewer360 > div,
        .viewer360 .psv-container,
        .viewer360 .psv-canvas-container {
            width: 100% !important;
            height: 100% !important;
            position: relative !important;
            overflow: hidden;
        }
        
        .viewer360 canvas {
            width: 100% !important;
            height: 100% !important;
            display: block !important;
            max-width: 100%;
            max-height: 100%;
        }
        
        .viewer360:hover {
            opacity: 0.9;
            transform: scale(1.02);
            transition: all 0.3s ease;
        }
        
        #viewer-modal {
            animation: fadeIn 0.3s ease-out;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        #fechar-modal:hover {
            background: #fff;
            transform: scale(1.05);
        }
        
        
        /* Media query para mobile - continuação */
        @media (max-width: 768px) {
            main {
                padding: 35px 25px !important;
            }
            
            .viewer360 {
                max-width: 100%;
                height: 300px;
                margin: 15px auto 40px;
            }
            
            .estudio-container {
                padding: 0 15px;
            }
            
            .estúdio-texto {
                margin-bottom: 30px;
            }
            
            .estúdio-texto h2 {
                font-size: 24px;
            }
            
            .estúdio-texto p {
                font-size: 14px;
            }
        }
        
        /* ====== Página Artistas ====== */
        .artistas-page {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            gap: 40px;
            position: relative;
            z-index: 100;
        }
        .perfil-artista {
            display: flex;
            flex-direction: row;
            gap: 30px;
            align-items: flex-start;
            background: #111;
            border: 2px solid #f5c400;
            border-radius: 20px;
            padding: 30px;
            max-width: 1000px;
            margin: 0 auto;
            width: 100%;
            box-sizing: border-box;
            position: relative;
            z-index: 100;
        }
        .perfil-foto-box {
            flex-shrink: 0;
            width: 200px;
            height: 200px;
            overflow: hidden;
            border-radius: 16px;
            border: 2px solid #f5c400;
        }
        .perfil-foto-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .perfil-info {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
            z-index: 101;
        }
        .perfil-info h2 {
            color: #f5c400;
            margin: 0 0 15px 0;
            font-size: 28px;
        }
        .perfil-info p {
            color: #ddd;
            line-height: 1.7;
            margin: 0 0 12px 0;
            font-size: 16px;
        }
        .perfil-info a {
            color: #00aaff;
            text-decoration: none;
            font-weight: bold;
            margin-right: 15px;
            display: inline-block;
            position: relative;
            z-index: 102;
            touch-action: manipulation;
            cursor: pointer;
            -webkit-tap-highlight-color: rgba(0, 170, 255, 0.3);
        }
        .perfil-info a:hover {
            text-decoration: underline;
        }
        .btn-artista {
            display: inline-block;
            background-color: #f5c400;
            color: #000;
            padding: 12px 24px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: bold;
            margin-top: 10px;
            transition: background-color 0.3s;
            position: relative;
            z-index: 102;
            touch-action: manipulation;
            min-height: 44px;
            min-width: 120px;
            cursor: pointer;
            -webkit-tap-highlight-color: rgba(245, 196, 0, 0.5);
            user-select: none;
            -webkit-user-select: none;
        }
        .btn-artista:hover {
            background-color: #fff;
            color: #000;
        }
        .btn-artista:active {
            background-color: #fff;
            transform: scale(0.98);
        }
        
        /* ====== Responsivo Artistas ====== */
        @media screen and (max-width: 768px) {

                padding: 30px 15px;

            /* ====== Grid de Artistas (One-Page) ====== */

        <!-- PhotoSphereViewer Scripts - Carregamento simplificado -->
        <script>
            (function() {
                function initViewer() {
                    // Carregar apenas se necessário (página do estúdio)
                    if (!document.querySelector('.viewer360')) return;
                    
                    const scripts = [
                        'https://cdn.jsdelivr.net/npm/three@0.87.1/build/three.min.js',
                        'https://cdn.jsdelivr.net/npm/uevent@2.0.0/browser.js',
                        'https://cdn.jsdelivr.net/npm/dot@1.1.3/doT.min.js',
                        'https://cdn.jsdelivr.net/npm/photo-sphere-viewer@3.5.1/dist/photo-sphere-viewer.min.js'
                    ];
                    
                    function loadScript(src, onLoad) {
                        const script = document.createElement('script');
                        script.src = src;
                        script.async = true;
                        if (onLoad) script.onload = onLoad;
                        script.onerror = function() { console.error('Erro ao carregar:', src); };
                        document.body.appendChild(script);
                    }
                    
                    // Carregar sequencialmente (dependências)
                    loadScript(scripts[0], function() {
                        loadScript(scripts[1], function() {
                            loadScript(scripts[2], function() {
                                loadScript(scripts[3], function() {
                                    window.PHOTOSPHERE_READY = true;
                                });
                            });
                        });
                    });
                }
                
                // Aguardar DOM estar pronto
                if (document.readyState === 'loading') {
                    document.addEventListener('DOMContentLoaded', initViewer);
                } else {
                    initViewer();
                }
            })();
            // Função para abrir o modal do artista
            function openArtist(artistId) {
                const modal = document.getElementById('artist-modal');
                if (!modal) {
                    console.error('Modal não encontrado!');
                    return;
                }
                
                const bodies = document.querySelectorAll('.artist-modal-body');
                bodies.forEach(body => body.style.display = 'none');

                const activeBody = document.getElementById('artist-' + artistId);
                if (activeBody) {
                    activeBody.style.display = 'block';
                    modal.classList.add('show');
                    document.body.style.overflow = 'hidden';
                } else {
                    console.error('Corpo do modal não encontrado para:', 'artist-' + artistId);
                }
            }
                // Função para fechar o modal do artista
                function closeArtist() {
                    const modal = document.getElementById('artist-modal');
                    modal.classList.remove('show');
                    document.body.style.overflow = '';
                }
                // Função para fechar o modal ao clicar fora
                document.addEventListener('click', function(event) {
                    const modal = document.getElementById('artist-modal');
                    if (modal.classList.contains('show') && event.target === modal) {
                        closeArtist();
                    }
                });
        </script>
        
        <!-- Script para animações premium das seções -->
        <script>
            (function() {
                'use strict';
                
                // Detectar mobile para ajustar configurações
                const isMobile = window.innerWidth <= 768;
                
                // Intersection Observer - mais responsivo no mobile
                const observerOptions = {
                    root: null,
                    // Mobile: anima mais cedo (50px antes). Desktop: 100px antes
                    rootMargin: isMobile ? '0px 0px -50px 0px' : '0px 0px -100px 0px',
                    // Mobile: anima com menos visibilidade (5%). Desktop: 10%
                    threshold: isMobile ? 0.05 : 0.1
                };
                
                const observer = new IntersectionObserver(function(entries) {
                    entries.forEach(function(entry) {
                        if (entry.isIntersecting) {
                            entry.target.classList.add('visible');
                            // Opcional: desobservar após animar para melhor performance
                            // observer.unobserve(entry.target);
                        }
                    });
                }, observerOptions);
                
                // Observar todas as seções quando o DOM estiver pronto
                document.addEventListener('DOMContentLoaded', function() {
                    // Observar seções com class="section" E também seções com id="loja" ou class="loja-section"
                    const sections = document.querySelectorAll('section.section, section#loja, section.loja-section');
                    sections.forEach(function(section) {
                        // Verificar se já está visível na tela
                        const rect = section.getBoundingClientRect();
                        // No mobile, verificar com mais margem para carregar mais cedo (200px antes)
                        const viewportMargin = isMobile ? window.innerHeight + 200 : window.innerHeight;
                        if (rect.top < viewportMargin && rect.bottom > -100) {
                            section.classList.add('visible');
                        } else {
                            observer.observe(section);
                        }
                    });
                    
                    // No mobile, também observar durante o scroll para detectar mais cedo
                    if (isMobile) {
                        let scrollTimeout;
                        window.addEventListener('scroll', function() {
                            clearTimeout(scrollTimeout);
                            scrollTimeout = setTimeout(function() {
                                sections.forEach(function(section) {
                                    if (!section.classList.contains('visible')) {
                                        const rect = section.getBoundingClientRect();
                                        if (rect.top < window.innerHeight + 150) {
                                            section.classList.add('visible');
                                        }
                                    }
                                });
                            }, 50);
                        }, { passive: true });
                    }
                });
                
                // Smooth scroll premium com offset
                document.querySelectorAll('a[href^="#"]').forEach(function(anchor) {
                    anchor.addEventListener('click', function(e) {
                        // Ignorar cliques em imagens de produtos e seus containers
                        if (e.target.closest('.produto-card') || e.target.classList.contains('produto-imagem')) {
                            return;
                        }
                        const href = this.getAttribute('href');
                        if (href === '#' || href === '#home') {
                            e.preventDefault();
                            window.scrollTo({
                                top: 0,
                                behavior: 'smooth'
                            });
                            return;
                        }
                        
                        const target = document.querySelector(href);
                        if (target) {
                            e.preventDefault();
                            const targetPosition = target.getBoundingClientRect().top + window.pageYOffset;
                            window.scrollTo({
                                top: targetPosition,
                                behavior: 'smooth'
                            });
                        }
                    });
                });
            })();
        </script>

        <!-- Script para descrição modal -->
        <script>
            // Variável global para salvar posição do scroll
            let savedScrollPosition = 0;
            let modalAberto = false; // Prevenir duplo clique
            
            function abrirDescricao(titulo, texto, imagemUrl, preco, elementoImg) {
                // Prevenir duplo clique
                if (modalAberto) {
                    return false;
                }
                const modal = document.getElementById('descricao-modal');
                const tituloEl = document.getElementById('descricao-titulo');
                const textoEl = document.getElementById('descricao-texto');
                const precoEl = document.getElementById('descricao-preco');
                const comprarEl = document.getElementById('descricao-comprar');
                const imagemEl = document.getElementById('descricao-imagem');
                const imagemContainer = document.getElementById('descricao-imagem-container');
                const descricaoBox = document.querySelector('.descricao-box');
                
                // Obter índice do produto do data attribute
                let indice = 0;
                if (elementoImg && elementoImg.getAttribute) {
                    const indiceStr = elementoImg.getAttribute('data-produto-indice');
                    if (indiceStr !== null && indiceStr !== '') {
                        indice = parseInt(indiceStr, 10);
                        if (isNaN(indice)) {
                            indice = 0;
                        }
                    }
                }
                
                if (modal && tituloEl && textoEl) {
                    tituloEl.innerText = titulo;
                    if (precoEl && preco) {
                        precoEl.innerText = 'R$ ' + preco;
                    }
                    textoEl.innerText = texto;
                    
                    if (comprarEl && titulo) {
                        const mensagem = encodeURIComponent('Olá, gostaria de comprar o produto ' + titulo);
                        comprarEl.href = 'https://wa.me/5511988582267?text=' + mensagem;
                    }
                    
                    if (imagemUrl && imagemEl) {
                        imagemContainer.style.display = 'block';
                        imagemEl.src = imagemUrl;
                        imagemEl.alt = titulo;
                    } else if (imagemContainer) {
                        imagemContainer.style.display = 'none';
                    }
                    
                    // Salvar posição do scroll antes de bloquear
                    savedScrollPosition = window.scrollY || window.pageYOffset || document.documentElement.scrollTop;
                    
                    // Calcular largura da scrollbar antes de esconder
                    const scrollbarWidth = window.innerWidth - document.documentElement.clientWidth;
                    
                    // Bloquear scroll do body e compensar scrollbar
                    document.body.style.position = 'fixed';
                    document.body.style.top = '-' + savedScrollPosition + 'px';
                    document.body.style.width = '100%';
                    document.body.style.overflow = 'hidden';
                    if (scrollbarWidth > 0) {
                        document.body.style.paddingRight = scrollbarWidth + 'px';
                    }
                    
                    // Garantir que o modal está sempre na viewport, não no documento
                    // Garantir que o modal está sempre na viewport (independente do scroll)
                    modal.style.cssText = 'position: fixed !important; top: 0 !important; left: 0 !important; right: 0 !important; bottom: 0 !important; width: 100vw !important; height: 100vh !important; margin: 0 !important; padding: 0 !important; z-index: 999999 !important;';
                    
                    modalAberto = true;
                    modal.classList.add('active');
                    
                    // Aplicar transform diferente baseado no índice (0-4) apenas no desktop
                    // Containers 1-4 (índices 0-3): sobem levemente
                    // Container 5 (índice 4): desce
                    if (descricaoBox) {
                        // Garantir que o container está sempre centralizado em relação ao modal
                        descricaoBox.style.position = 'absolute';
                        descricaoBox.style.top = '50%';
                        descricaoBox.style.left = '50%';
                        descricaoBox.style.margin = '0';
                        descricaoBox.style.right = 'auto';
                        descricaoBox.style.bottom = 'auto';
                        
                        if (window.innerWidth > 480) {
                            // Calcular posição Y baseada no índice
                            let offsetY = 0;
                            if (indice === 4) {
                                offsetY = 15; // Último container: desce
                            } else if (indice >= 0 && indice <= 3) {
                                offsetY = -12; // Containers 1-4: sobem
                            }
                            
                            descricaoBox.style.transform = 'translate(-50%, calc(-50% + ' + offsetY + 'px))';
                        } else {
                            // No mobile, apenas centralização
                            descricaoBox.style.transform = 'translate(-50%, -50%)';
                        }
                    }
                    
                    // No mobile, garantir que o scroll do modal está no topo
                    if (window.innerWidth <= 480) {
                        setTimeout(function() {
                            if (modal) {
                                modal.scrollTop = 0;
                            }
                        }, 50);
                    }
                }
            }
            
            function fecharDescricao(event) {
                if (event) {
                    event.preventDefault();
                    event.stopPropagation();
                }
                const modal = document.getElementById('descricao-modal');
                const descricaoBox = document.querySelector('.descricao-box');
                if (modal) {
                    // Resetar transform ao fechar (voltar para centralização padrão)
                    if (descricaoBox) {
                        descricaoBox.style.transform = 'translate(-50%, -50%)';
                    }
                    modalAberto = false;
                    modal.style.display = 'none';
                    modal.classList.remove('active');
                    
                    // Restaurar propriedades do body
                    document.body.style.position = '';
                    document.body.style.top = '';
                    document.body.style.width = '';
                    document.body.style.overflow = '';
                    document.body.style.paddingRight = '';
                    
                    // Restaurar posição do scroll
                    if (savedScrollPosition !== undefined && savedScrollPosition !== null) {
                        const html = document.documentElement;
                        const originalScrollBehavior = html.style.scrollBehavior;
                        html.style.scrollBehavior = 'auto';
                        
                        window.scrollTo(0, savedScrollPosition);
                        document.documentElement.scrollTop = savedScrollPosition;
                        document.body.scrollTop = savedScrollPosition;
                        
                        requestAnimationFrame(function() {
                            html.style.scrollBehavior = originalScrollBehavior;
                        });
                    }
                }
            }
            
            document.addEventListener('DOMContentLoaded', function() {
                const modal = document.getElementById('descricao-modal');
                if (modal) {
                    modal.addEventListener('click', function(e) {
                        if (e.target === modal) {
                            fecharDescricao();
                        }
                    });
                }
            });
        </script>
